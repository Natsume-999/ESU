# ========================================
# ESU 插件配置
# ========================================
version: ${version}

# ========================================
# 世界规则模块
# 对指定世界或所有世界应用 gamerule 规则
# 规则名使用 kebab-case 格式 (如 keep-inventory → keep_inventory)
# "*" 表示对所有世界生效
# ========================================
allow-world-gamerule:
  # 模块开关
  enable: true
  worlds:
    # "*" = 所有世界
    "*":
      # 是否保留死亡玩家背包 (对应 keep_inventory 规则)
      keep-inventory: true
    # 指定单个世界
    "world":
      keep-inventory: true

# ========================================
# 网络包拦截模块
# 拦截服务端发送的网络包
# ========================================
handle-network-listener:
  # 模块开关
  enable: true
  # 伤害粒子拦截
  damage-indicator: true
  # 匹配的系统聊天内容 (拦截后取消消息)
  chat-network-content:
    - "命令"
  # 匹配后转发的 BetterHud 弹窗名称 (留空则不转发)
  chat-replay-popup: "entity_health_popup"

# ========================================
# 配方管理模块 (MMOItems 版)
# 清除原版配方，注册 MMOItems 物品的"图鉴配方"。
# 配方仅用于配方书展示与点击触发动作，不可实际合成。
# 物品用 "类型:ID" 格式 (如 SWORD:CUTLASS、MATERIAL:TOKEN)。
# 配方命名空间: esu:物品id (全小写)
# 依赖: MMOItems
# ========================================
cover-vanilla-recipe:
  # 模块开关
  enable: true
  # 是否删除原版配方
  clear-vanilla-recipe: true
  # 是否禁止原版配方解锁弹窗
  disable-recipe-discovery: true
  # 配方书展示用的材料物品 (类型:ID), 仅作图鉴材料展示
  material: "MATERIAL:CRAFTING_TOKEN"
  # 配方列表: 每个键是成品的 类型:ID, 值是点击配方书时执行的动作
  # 动作前缀:
  #   message: 文本    给玩家发消息 (支持 & 颜色码)
  #   command: 指令    控制台执行 (%player% 替换为玩家名)
  #   player: 指令     玩家身份执行 (%player% 替换为玩家名)
  #   give: 类型:ID    给予一个 MMOItems 物品
  recipes:
    "SWORD:CUTLASS":
      - "message: &a你点亮了 &e利刃 &a配方!"
      - "give: SWORD:CUTLASS"
    "BOW:DRAGON_BOW":
      - "message: &a获得 &e龙弓"
      - "give: BOW:DRAGON_BOW"

# ========================================
# 对话扩展模块 (Chemdah 对话主题)
# 玩家开始 Chemdah 对话时隐藏 HUD 并显示对话主题
# 依赖: BetterHud + Chemdah + PlaceholderAPI
# ========================================
type-writer:
  # 模块开关
  enable: true
  # 对话时隐藏的 HUD 列表 (留空则无隐藏)
  hide:
    - "default_hud"
  theme:
    # 对话 HUD 名称
    name: "theme_hud"
    # 动画播放速度 (值越低越快)
    speed: 1
    # 对话音效配置
    play-sound:
      # 音效名称
      name: ENTITY_EXPERIENCE_ORB_PICKUP
      # 音调
      pitch: 2
      # 音量
      volume: 0
    # 对话结束延迟 (20 tick = 1秒)
    delay: 20
    # 玩家移动多少格就结束对话
    distance: 2
    # 一次最多展示的回复数量 (0=上一页, 6=下一页)
    size: 4
    # 文本格式
    format:
      # 标题格式
      title: "{title}"
      # 回复文本格式
      reply:
        # 选中状态
        select: "<white>{player_side}"
        # 未选中状态
        default: "<gray>{player_side}"

# ========================================
# 受伤血屏效果模块
# 通过 WorldBorder 实现血屏效果，完全自包含
# 原理：缩小 WorldBorder 到极小尺寸，利用边界警告颜色显示红色血屏
# 血量越低，WorldBorder 越小，红色越明显
# ========================================
hurt-vision:
  # 模块开关
  enable: true
  # 淡出效果
  fade:
    # 是否启用淡出
    enabled: true
    # 淡出时间 (秒)
    time: 5
  # 伤害强度倍率 (值越大血屏越红越明显)
  intensity-modifier: 2
  # 触发血屏的最低生命值 (-1 受到伤害立即显示)
  minimum-health: -1
  # 伤害模式开关
  damage-mode: true

# ========================================
# 自动播报公告模块
# ========================================
auto-broadcast:
  # 模块开关
  enable: true
  # 播放类型 ( random 为随机播报，而 iteration 为依次播报)
  type: random
  # 播报间隔 (秒)
  every: 30
  # 公告内容 (支持 PlaceholderAPI 变量)
  broadcast:
    "测试内容":
      - "今日为 %server_time% 所在 %player_world% 世界 (ESU)"
    "测试内容2":
      - "Hello World (ESU)"

# ========================================
# 武器技能模块 (武器即职业)
# 手持的 MMOItems 武器决定 MMOCore 技能栏绑定的技能，换武器即换技能组。
# 技能释放仍走 MMOCore 原生按键 (技能栏施法)。
# 依赖: MMOCore + MMOItems
#
# 【重要前提】绑定能生效需满足:
#   1. 玩家已有 MMOCore 职业 (可以是一个通用默认职业)
#   2. 该职业在 MMOCore 配置里定义了足够数量的技能槽位 (skill-slots)
#      例如配置里某武器给 3 个技能, 职业就需要至少 3 个 skill slot
#   3. 技能为可释放的主动技能 (永久被动 isPermanent 的技能会被 MMOCore 拒绝绑定)
#
# 配置说明:
#   weapons 下每个键是 MMOItems 物品 ID (大小写不敏感, 建议大写),
#   值为技能 ID 列表, 按顺序绑定到技能槽 1, 2, 3...
#   技能 ID 为 MMOCore 已注册的技能 (skill 文件夹里的技能), 不限职业。
# ========================================
weapon-skill:
  # 模块开关
  enable: false
  # 绑定技能时使用的技能最大等级 (一般填 1; 若技能可升级可调高)
  max-skill-level: 3
  # 切换到非配置武器/空手时, 是否清空之前武器的技能绑定
  clear-when-unequip: true
  # 切换提示
  message:
    # 是否显示提示
    enable: true
    # true=显示在动作栏(物品栏上方), false=显示在聊天框
    action-bar: true
    # 切换到某武器时的提示, {weapon} 替换为武器显示名
    equip: "&a已切换为 &e{weapon} &a技能组"
    # 收起武器(空手/非配置武器)时的提示
    unequip: "&7已收起武器技能"
  # 武器 -> 技能 映射
  # 两种写法:
  #   1) 直接列技能 (键即武器物品ID, 提示里显示物品ID)
  #   2) 用 name + skills (可自定义提示里显示的武器名)
  weapons:
    # 写法1: 物品 ID 为 CUTLASS 的剑, 绑定三个技能到技能槽 1/2/3
    CUTLASS:
      - WHIRLWIND
      - DASH
      - HEALING
    # 写法2: 带显示名, 提示会显示"长弓"而非 DRAGON_BOW
    DRAGON_BOW:
      name: "&b长弓"
      skills:
        - PIERCING_ARROW
        - ARROW_RAIN
    # 写法1: 法杖
    FIRE_STAFF:
      - FIREBALL
      - FIRE_NOVA
      - METEOR

